name: validate
on:
  pull_request:
    paths:
      - "skills/**"
      - "README.md"
      - ".github/workflows/validate.yml"
  push:
    branches: [main]

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check every skill has SKILL.md and README.md
        run: |
          set -euo pipefail
          fail=0
          for dir in skills/*/; do
            name="$(basename "$dir")"
            for f in SKILL.md README.md; do
              if [ ! -f "$dir$f" ]; then
                echo "::error file=$dir$f::missing $f in skill '$name'"
                fail=1
              fi
            done
          done
          exit $fail

      - name: Validate SKILL.md frontmatter (name + description)
        run: |
          set -euo pipefail
          fail=0
          for f in skills/*/SKILL.md; do
            # Extract frontmatter block (between first two `---` lines)
            fm=$(awk '/^---$/{c++; next} c==1{print} c==2{exit}' "$f")
            if [ -z "$fm" ]; then
              echo "::error file=$f::no YAML frontmatter"
              fail=1; continue
            fi
            if ! echo "$fm" | grep -qE '^name:\s*\S'; then
              echo "::error file=$f::frontmatter missing 'name:'"
              fail=1
            fi
            if ! echo "$fm" | grep -qE '^description:\s*\S'; then
              echo "::error file=$f::frontmatter missing 'description:'"
              fail=1
            fi
            # frontmatter name must match folder
            folder="$(basename "$(dirname "$f")")"
            fmname=$(echo "$fm" | grep -E '^name:' | head -1 | sed -E 's/^name:\s*//; s/[[:space:]]*$//')
            if [ "$fmname" != "$folder" ]; then
              echo "::error file=$f::frontmatter name '$fmname' does not match folder '$folder'"
              fail=1
            fi
          done
          exit $fail

      - name: Check root README lists every skill
        run: |
          set -euo pipefail
          fail=0
          for dir in skills/*/; do
            name="$(basename "$dir")"
            if ! grep -qE "\[$name\]\(skills/$name\)" README.md; then
              echo "::error file=README.md::skill '$name' not linked from root README table"
              fail=1
            fi
          done
          exit $fail

      - name: Check SKILL.md body sections (When to use / Steps-equivalent / Rules)
        run: |
          set -euo pipefail
          fail=0
          # A skill's "how to execute" section may go by different names depending on
          # its shape. Accept any of these — but nothing outside this set.
          STEPS_RE='^## (Steps|Phased flow|The loop|Method|Design checklist|Review checklist|Review rubric|Review categories|The decision tree|Structure)( |$)'
          for f in skills/*/SKILL.md; do
            name=$(basename "$(dirname "$f")")
            grep -qE '^## When to use' "$f" \
              || { echo "::error file=$f::missing '## When to use' section"; fail=1; }
            grep -qE "$STEPS_RE" "$f" \
              || { echo "::error file=$f::missing steps-equivalent section (Steps / Phased flow / The loop / Method / Design checklist / Review checklist / Review rubric / Review categories / The decision tree / Structure)"; fail=1; }
            grep -qE '^## Rules|^### Rules' "$f" \
              || { echo "::error file=$f::missing '## Rules' section"; fail=1; }
          done
          exit $fail

      - name: Check README.md has Install and What-it-does
        run: |
          set -euo pipefail
          fail=0
          for f in skills/*/README.md; do
            grep -qE '^## Install' "$f" \
              || { echo "::error file=$f::missing '## Install' section"; fail=1; }
            grep -qE '^## What it does' "$f" \
              || { echo "::error file=$f::missing '## What it does' section"; fail=1; }
          done
          exit $fail

      - name: Warn if SKILL.md is very large (> 400 lines)
        run: |
          # Advisory only — mega-skills should live in references/
          for f in skills/*/SKILL.md; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 400 ]; then
              echo "::warning file=$f::SKILL.md is $lines lines (median ~90). Consider moving detail into references/*.md and keeping SKILL.md as the decision spine."
            fi
          done

      - name: Lint install.sh
        run: |
          if command -v shellcheck >/dev/null; then
            shellcheck install.sh || true
          fi
          bash -n install.sh
